<!DOCTYPE html>
<html>

<head>
    <title>Display exercise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        h1,
        h2 {

            font-family: "Crimson Text",
                serif;

        }

        p {
            font-family: "Work Sans", sans-serif;
            font-weight: 400;
            font-style: normal;
        }



        #container {
            max-width: 1280px;
            margin: auto;
            background-color: #74c19d;
        }

        #nav {
            display: flex;
            justify-content: space-between;
        }

        #banner {
            display: flex;
        }

        #banner-text {
            width: 55%;
            background-color: #74c19d;
            display: flex;
            Align-items: center;
        }

        #banner-image {
            width: 60%;
            background-color: #74c19d;
        }
    </style>

</head>

<body>
    <div id="container">

        <div id="nav">
            <div> <img src="imagefile/logo.png" width="30"> </div>
            <div>Menu</div>
        </div>

        <div id="banner">
            <div id="banner-text">

                <div class="banner-container">
                    <h1>WELCOME</h1>
                    <h2>Lorem ipsum dolor sit amet consectetur</h2>
                    <p> Lorem ipsum, dolor sit amet consectetur adipisicing elit. Suscipit nemo hic quos, ab, dolor
                        aperiam nobis cum est eos error ipsum, voluptate culpa nesciunt delectus iste? </p>
                    <button> Read more</button>
                </div>

            </div>


            <div id="banner-image"> <img src="imagefile/group1.png" width="500"> </div>
        </div>

    </div>
</body>

</html>
